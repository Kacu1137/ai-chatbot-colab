<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="Deep Learning AI Chatbot implemented in Google Colab with interactive interface">
<meta name="keywords" content="AI, Chatbot, Google Colab, Deep Learning, NLP, Neural Network, Interactive Chat, Python, TensorFlow">
<meta name="author" content="Don Youssef">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chatbot Research Project</title>
<meta name="google-site-verification" content="k-FEEWW6qOQkjpD4FJC0CYEQ6MumfivcP9I4L6SQyO4" />

<style>
body {
    margin: 0;
    font-family: "Segoe UI", Tahoma, sans-serif;
    background: #0b0b0b;
    color: #eaeaea;
    overflow-x: hidden;
    position: relative;
}

/* Matrix effect */
#matrix {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
}

/* Container */
.container {
    width: 80%;
    max-width: 800px;
    margin: 40px auto;
    position: relative;
    z-index: 5;
}

/* Header */
h1 {
    color: #ff7a00;
    text-align: center;
    margin-bottom: 30px;
    text-shadow: 0 0 8px #ff7a00, 0 0 16px #ff7a00;
}

/* Chat Box */
.chat-box {
    background: #111;
    padding: 20px;
    border-radius: 10px;
    height: 450px;
    overflow-y: auto;
    box-shadow: 0 0 30px rgba(255,122,0,0.2);
    display: flex;
    flex-direction: column;
    position: relative;
}

/* Messages */
.msg {
    max-width: 70%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 12px;
    position: relative;
    animation: slideIn 0.3s ease forwards;
}

/* User & Bot */
.msg.user {
    background: #1f1f1f;
    color: orange;
    align-self: flex-end;
}

.msg.bot {
    background: #1a1a1a;
    color: #ff0000; /* أحمر غامق نيون */
    align-self: flex-start;
    text-shadow: 0 0 6px #ff0000, 0 0 10px #ff0000;
}

.msg.typing {
    color: #00cc00; /* أخضر غامق نيون */
    font-style: italic;
    text-shadow: 0 0 6px #00cc00, 0 0 10px #00cc00;
}

/* Slide animation */
@keyframes slideIn {
    0% {opacity:0; transform: translateY(20px);}
    100% {opacity:1; transform: translateY(0);}
}

/* Input Area */
.input-area {
    display: flex;
    margin-top: 15px;
}

input {
    flex: 1;
    padding: 12px;
    background: #1a1a1a;
    border: none;
    color: orange;
    border-radius: 8px;
    font-size: 16px;
}

button {
    padding: 12px 18px;
    margin-left: 8px;
    border: 2px solid #ff7a00;
    background: transparent;
    color: #ff7a00;
    font-size: 18px;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #ff7a00;
    color: #0b0b0b;
    transform: scale(1.1);
}

/* Scrollbar */
.chat-box::-webkit-scrollbar {
    width: 8px;
}
.chat-box::-webkit-scrollbar-track {
    background: #0b0b0b;
}
.chat-box::-webkit-scrollbar-thumb {
    background: #ff7a00;
    border-radius: 4px;
}
</style>
</head>
<body>
<canvas id="matrix"></canvas>

<div class="container">
    <h1>AI Chatbot Demo</h1>

    <div class="chat-box" id="chat">
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type your message..." />
        <button id="sendBtn">➤</button>
    </div>
</div>

<script>
// Matrix effect
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
const fontSize = 16;
const columns = canvas.width / fontSize;
const drops = Array(Math.floor(columns)).fill(1);
function drawMatrix() {
    ctx.fillStyle = 'rgba(11,11,11,0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#ff6600'; // برتقالي غامق نيون
    ctx.font = fontSize + 'px monospace';
    for (let i = 0; i < drops.length; i++) {
        const text = letters[Math.floor(Math.random()*letters.length)];
        ctx.fillText(text, i*fontSize, drops[i]*fontSize);
        drops[i]++;
        if(drops[i]*fontSize > canvas.height && Math.random() > 0.975) drops[i]=0;
    }
}
setInterval(drawMatrix, 50);

// Chat logic
const chatBox = document.getElementById("chat");
const input = document.getElementById("userInput");
const sendBtn = document.getElementById("sendBtn");

// Add message
function addMessage(text, cls) {
    const div = document.createElement("div");
    div.className = `msg ${cls}`;
    div.innerText = text;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
    return div;
}

// Bot typing
function botReply(text, delay=800) {
    const typing = addMessage("typing...", "typing");
    setTimeout(() => {
        typing.remove();
        addMessage(text, "bot");
    }, delay);
}

// Initial fixed conversation
async function playInitialConversation() {
    const initialConv = [
        {user: "Who are you?", bot: "I'm Zain, your Artificial Intelligent Assistant bot."},
        {user: "Ok Zain, I need some help", bot: "Yes, sure. How can I support you?"},
        {user: "I'm feeling sad", bot: "Get close to Allah."},
        {user: "Thanks dude, see you", bot: "You're welcome!"}
    ];

    for(const msg of initialConv) {
        addMessage(msg.user, "user");
        await new Promise(r => setTimeout(r, 1000));
        botReply(msg.bot, 1500);
        await new Promise(r => setTimeout(r, 2000));
    }
}

setTimeout(playInitialConversation, 1000);

// Send user input manually
sendBtn.addEventListener("click", () => {
    if(input.value.trim() !== "") {
        addMessage(input.value.trim(), "user");
        botReply("Sorry, this demo uses a predefined conversation.", 1000);
        input.value = "";
    }
});
</script>
</body>
    </html>
