<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="Deep Learning AI Chatbot implemented in Google Colab with interactive interface">
<meta name="keywords" content="AI, Chatbot, Google Colab, Deep Learning, NLP, Neural Network, Interactive Chat, Python, TensorFlow">
<meta name="author" content="Don Youssef">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chatbot Research Project</title>
<meta name="google-site-verification" content="k-FEEWW6qOQkjpD4FJC0CYEQ6MumfivcP9I4L6SQyO4" />
<style>
body {
    margin: 0;
    font-family: "Segoe UI", Tahoma, sans-serif;
    background: #0b0b0b;
    color: #eaeaea;
    overflow-x: hidden;
    position: relative;
}

/* Falling letters and numbers */
.falling-char {
    position: fixed;
    top: -20px;
    font-weight: bold;
    color: #ff7a00;
    font-size: 16px;
    z-index: 5;
    animation: fall linear infinite;
}

@keyframes fall {
    0% { transform: translateY(-20px); }
    100% { transform: translateY(110vh); }
}

/* Container */
.container {
    width: 80%;
    max-width: 800px;
    margin: 40px auto;
}

/* Header */
h1 {
    color: #ff7a00;
    text-align: center;
    margin-bottom: 30px;
    text-shadow: 0 0 8px #ff7a00, 0 0 16px #ff7a00;
}

/* Chat Box */
.chat-box {
    background: #111;
    padding: 20px;
    border-radius: 10px;
    height: 450px;
    overflow-y: auto;
    box-shadow: 0 0 30px rgba(255,122,0,0.2);
    display: flex;
    flex-direction: column;
    position: relative;
}

/* Messages */
.msg {
    max-width: 70%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 12px;
    position: relative;
    animation: slideIn 0.3s ease forwards;
}

.msg.user {
    background: #1f1f1f;
    color: #ff7a00; /* user orange */
    align-self: flex-end;
}

.msg.bot {
    background: #1a1a1a;
    color: #ff0000; /* bot dark red neon */
    align-self: flex-start;
}

.msg.typing {
    color: #00ff00; /* dark neon green */
    font-style: italic;
}

/* Slide animation */
@keyframes slideIn {
    0% {opacity:0; transform: translateY(20px);}
    100% {opacity:1; transform: translateY(0);}
}

/* Input Area */
.input-area {
    display: flex;
    margin-top: 15px;
}

input {
    flex: 1;
    padding: 12px;
    background: #1a1a1a;
    border: none;
    color: orange;
    border-radius: 8px;
    font-size: 16px;
}

button {
    padding: 12px 18px;
    margin-left: 8px;
    border: 2px solid #ff7a00;
    background: transparent;
    color: #ff7a00;
    font-size: 18px;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #ff7a00;
    color: #0b0b0b;
    transform: scale(1.1);
}

/* Scrollbar */
.chat-box::-webkit-scrollbar {
    width: 8px;
}
.chat-box::-webkit-scrollbar-track {
    background: #0b0b0b;
}
.chat-box::-webkit-scrollbar-thumb {
    background: #ff7a00;
    border-radius: 4px;
}
</style>
</head>
<body>

<div class="container">
    <h1>AI Chatbot Demo</h1>

    <div class="chat-box" id="chat">
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type your message..." />
        <button id="sendBtn">➤</button>
    </div>
</div>

<script>
// ======= Falling characters =======
function createFallingChar() {
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    const span = document.createElement('span');
    span.textContent = chars[Math.floor(Math.random()*chars.length)];
    span.className = 'falling-char';
    span.style.left = Math.random() * window.innerWidth + 'px';
    span.style.animationDuration = (2 + Math.random() * 3) + 's';
    document.body.appendChild(span);
    setTimeout(()=>span.remove(), 5000);
}
setInterval(createFallingChar, 100);

// ======= Bot data =======
const botData = {
  "data": [
    {
      "label": "greeting",
      "patterns": ["Hi","Hey","Is anyone there?","Hello","Hay"],
      "responses": ["Hello","Hi","Hi there","Hey"]
    },
    {
      "label": "about",
      "patterns": ["Who are you?","What are you?","Who you are?"],
      "responses": ["I'm Zain, your bot assistant!","I'm Zain, an Artificial Intelligent bot!","I'm Zain, an Amit Artificial Intelligent bot"]
    },
    {
      "label": "name",
      "patterns": ["What is your name?","What should I call you?","What's your name?"],
      "responses": ["You can call me Zain","I'm Zain!","Just call me as Zain"]
    },
    {
      "label": "help",
      "patterns": ["Could you help me?","Give me a hand please","Can you help?","What can you do for me?","I need a support","I need a help","Support me please"],
      "responses": ["Tell me how can assist you","Tell me your problem to assist you","Yes Sure, How can I support you?"]
    },
    {
      "label": "sad",
      "patterns": ["I'm so sad","I'm sad","I feel sad","I feel so sad","I am sad","I'm alone","I have a lot of problems"],
      "responses": ["It is better for you to pray","Get close to Allah","You can watch a movie","Go out with your friends","It will be okay"]
    },
    {
      "label": "positive_sen",
      "patterns": ["I am depressed","I need encouragement","I'm so frustrated","I'm so frustrated with myself because I lost confidence"],
      "responses": ["I think you are great!","You are a genius!","You are awesome!"]
    },
    {
      "label": "thanks",
      "patterns": ["Thanks","Thank you","That's helpful","Thanks for the help"],
      "responses": ["Happy to help!","Any time","You're welcome!","You're most welcome!"]
    },
    {
      "label": "goodbye",
      "patterns": ["Bye","See you later","Goodbye"],
      "responses": ["See you later","Have a nice day","Bye! Come back again"]
    }
  ]
};

// ======= Chat logic =======
const chatBox = document.getElementById("chat");
const input = document.getElementById("userInput");
const sendBtn = document.getElementById("sendBtn");

const initialConversation = [
    { user: "Who are you?", bot: "I'm Zain, your Artificial Intelligent Assistant bot." },
    { user: "Ok Zain, I need some help", bot: "Yes, sure. How can I support you?" },
    { user: "I'm feeling sad", bot: "Get close to Allah." },
    { user: "Thanks dude, see you", bot: "You're welcome!" }
];

function addMessage(text, cls) {
    const div = document.createElement("div");
    div.className = `msg ${cls}`;
    div.innerText = text;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
    return div;
}

function botReplyFromData(inputText) {
    inputText = inputText.toLowerCase();
    for(const item of botData.data){
        for(const pattern of item.patterns){
            if(pattern.toLowerCase() === inputText){
                const resp = item.responses[Math.floor(Math.random()*item.responses.length)];
                return resp;
            }
        }
    }
    return "Sorry, I don't understand.";
}

function botReply(text, delay=800) {
    const typing = addMessage("typing...", "typing");
    setTimeout(()=>{
        typing.remove();
        addMessage(text, "bot");
    }, delay);
}

// ======= Play initial conversation =======
let convIndex = 0;
function playInitialConversation() {
    if(convIndex < initialConversation.length){
        const msg = initialConversation[convIndex];
        addMessage(msg.user, "user");
        setTimeout(()=>botReply(msg.bot, 1000), 500);
        convIndex++;
        setTimeout(playInitialConversation, 2500);
    }
}
setTimeout(playInitialConversation, 1000);

// ======= Manual user input =======
sendBtn.addEventListener("click", () => {
    const userText = input.value.trim();
    if(userText!==""){
        addMessage(userText, "user");
        const reply = botReplyFromData(userText);
        botReply(reply, 1000);
        input.value = "";
    }
});

input.addEventListener("keypress", (e)=>{
    if(e.key === "Enter"){
        sendBtn.click();
    }
});
</script>

</body>
</html>
